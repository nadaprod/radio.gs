<!DOCTYPE html>
<html lang="en">
<head>
    <title>404 // RADIO.GS</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="robots" content="noindex">
    <link rel="icon" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #D4FF00;
            --bg-dark: #030303;
            --text-main: #ffffff;
            --text-muted: #71717a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 40;
            background: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.02) 0px,
                rgba(255,255,255,0.02) 1px,
                transparent 1px,
                transparent 3px
            );
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vmin;
            height: 60vmin;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
            opacity: 0.08;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.06; transform: translate(-50%, -50%) scale(0.95); }
            50%      { opacity: 0.12; transform: translate(-50%, -50%) scale(1.05); }
        }

        .stage {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(1.5rem, 5vw, 3rem);
            text-align: center;
        }

        .status-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.25em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.2; }
        }

        .code {
            font-size: clamp(5rem, 18vw, 11rem);
            font-weight: 800;
            letter-spacing: -0.06em;
            line-height: 0.9;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .code .marker {
            font-family: 'Permanent Marker', cursive;
            font-weight: 400;
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
            margin-left: 0.15em;
            font-size: 0.7em;
            vertical-align: 0.15em;
        }

        .message {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-top: 1.5rem;
            max-width: 420px;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .message b {
            color: var(--text-main);
            font-weight: 500;
        }

        .btn-home {
            margin-top: 3rem;
            position: relative;
            padding: 1rem 2.5rem;
            background: black;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.3s, color 0.3s;
            z-index: 1;
            display: inline-block;
        }

        .btn-home::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0;
            background: var(--accent);
            z-index: -1;
            transition: height 0.3s ease;
        }

        .btn-home:hover {
            border-color: var(--accent);
            color: black;
        }

        .btn-home:hover::after { height: 100%; }

        .footer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #444;
            letter-spacing: 0.1em;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div class="scanlines"></div>
    <div class="noise-overlay"></div>

    <main class="stage">
        <div class="status-line">
            <span class="status-dot"></span>
            <span>SIGNAL_LOST // 404</span>
        </div>

        <h1 class="code">4<span class="marker">0</span>4</h1>

        <p class="message">
            This frequency is <b>off-air</b>.<br>
            The station you tuned to doesn't exist on this band.
        </p>

        <a href="/" class="btn-home">RETURN_TO_DIAL</a>
    </main>

    <div class="footer">RADIO.GS // STATIC</div>

</body>
</html>
